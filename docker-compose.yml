version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SCOPE_BASE_URL=https://www.scopecinemas.com/movies
      - SCRAPE_INTERVAL_MINUTES=10
      - PORT=3001

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend